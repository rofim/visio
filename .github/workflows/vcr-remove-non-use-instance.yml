name: Remove PR VCR instance on close

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  remove-vcr:
    name: Remove VCR instance
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install VCR CLI
        uses: ./.github/actions/install-vcr-cli

      - name: Remove VCR instance (tolerant)
        id: remove
        shell: bash
        env:
          VCR_API_KEY: ${{ secrets.VCR_API_KEY }}
          VCR_API_SECRET: ${{ secrets.VCR_API_SECRET }}
        run: |
          set -euo pipefail

          PROJECT_NAME="vonage-video-react-app"
          INSTANCE_NAME="vera-pr-${{ github.event.pull_request.number }}"

          echo "instance_name=$INSTANCE_NAME" >> "$GITHUB_OUTPUT"

          set +e
          vcr instance remove \
            --project-name "$PROJECT_NAME" \
            --instance-name "$INSTANCE_NAME" \
            --api-key "$VCR_API_KEY" \
            --api-secret "$VCR_API_SECRET" \
            --region aws.euw1 \
            --graphql-endpoint https://graphql.euw1.runtime.vonage.cloud/v1/graphql \
            2>&1 | tee remove-vcr-logs.log
          RC=${PIPESTATUS[0]}
          set -e

          # Removed successfully
          if [ "$RC" -eq 0 ]; then
            echo "result=removed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Instance did not exist -> non-fatal
          if grep -Eqi 'not found|does not exist|no such|404' remove-vcr-logs.log; then
            echo "result=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Real failure
          echo "result=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Slack notification on removed
        uses: ./.github/actions/slack-notify
        with:
          slack-bot-token: ${{ secrets.SLACK_NOTIFICATION }}
          color: '28a745'
          message: "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ github.event.pull_request.number }}|${{ github.event.pull_request.title }}>* \n with commit hash: ${{ github.sha }} \n had instance removed from VCR \nInstance: `${{ steps.remove.outputs.instance_name }}` \n*<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>* \n :large_green_circle: :large_green_circle: :large_green_circle: :large_green_circle:"
        if: steps.remove.outputs.result == 'removed'
        continue-on-error: true

      - name: Slack notification on no instance found
        uses: ./.github/actions/slack-notify
        with:
          slack-bot-token: ${{ secrets.SLACK_NOTIFICATION }}
          color: FFA500
          message: "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ github.event.pull_request.number }}|${{ github.event.pull_request.title }}>* \n with commit hash: ${{ github.sha }} \n had no VCR instance to remove \nInstance: `${{ steps.remove.outputs.instance_name }}` \n*<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>*"
        if: steps.remove.outputs.result == 'missing'
        continue-on-error: true

      - name: Slack notification on failure
        uses: ./.github/actions/slack-notify
        with:
          slack-bot-token: ${{ secrets.SLACK_NOTIFICATION }}
          color: FF0000
          message: "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ github.event.pull_request.number }}|${{ github.event.pull_request.title }}>* \n with commit hash: ${{ github.sha }} \n FAILED to remove instance from VCR \nInstance: `${{ steps.remove.outputs.instance_name }}` \n *<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>* \n :red_circle: :red_circle: :red_circle: :red_circle:"
        if: failure()
        continue-on-error: true
