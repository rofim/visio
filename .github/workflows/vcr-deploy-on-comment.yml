name: Deploy PR to VCR on comment

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to deploy
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  DOMAIN: ${{ secrets.DOMAIN }}

jobs:
  build-and-test:
    name: Deploy to VCR (comment trigger)
    # Run only when:
    # - comment is on a PR
    # - comment body is exactly 'vcr:deploy'
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.body == 'vcr:deploy') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    steps:
      - name: Load PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue?.number ?? Number(context.payload.inputs?.pr_number);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('title', pr.title || '');
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput(
              'is_fork',
              String(pr.head.repo.full_name !== pr.base.repo.full_name)
            );

      - name: Block forks
        if: steps.pr.outputs.is_fork == 'true'
        run: |
          echo "Deployment from forked repositories is not allowed."
          exit 1

      - name: Checkout PR HEAD SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Verify Node & Yarn versions
        run: |
          node -v
          yarn -v

      # Create dev VCR config, patch instance name, build artefact
      - name: Building artefact
        run: |
          # Add empty env file to avoid errors during build
          touch "${{ github.workspace }}/backend/.env"

          # Create a dev-specific VCR config file
          cp "${{ github.workspace }}/vcr-gha.yml" "${{ github.workspace }}/vcr-dev.yml"

          # REMOVE the domain line entirely for comment-based deploys
          sed -i '/^[[:space:]]*domains:/d' "${{ github.workspace }}/vcr-dev.yml"

          # Patch instance name to be PR-specific
          sed -i \
            "/^instance:/ {n; s/^  name: .*/  name: vera-pr-${{ steps.pr.outputs.number }}/;}" \
            "${{ github.workspace }}/vcr-dev.yml"

          ./vcrBuild.dev.sh

      - name: Install VCR CLI
        uses: ./.github/actions/install-vcr-cli

      - name: Deploy vcr
        id: deploy
        uses: ./.github/actions/deploy-vcr
        with:
          app-id: ${{ secrets.APP_ID }}
          api-key: ${{ secrets.VCR_API_KEY }}
          api-secret: ${{ secrets.VCR_API_SECRET }}
          filename: vcr-dev.yml

      - name: Comment PR on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: `## ✅ Deployed to VCR\n\n**URL:** ${{ steps.deploy.outputs.instance-url }}\n\n**Commit:** \`${{ steps.pr.outputs.head_sha }}\`\n\n[View build logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
        continue-on-error: true

      - name: Slack notification on success
        uses: ./.github/actions/slack-notify
        with:
          slack-bot-token: ${{ secrets.SLACK_NOTIFICATION }}
          color: '28a745'
          message: "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ steps.pr.outputs.number }}|${{ steps.pr.outputs.title }}>* \n with commit hash: ${{ steps.pr.outputs.head_sha }} \n is deployed to VCR \nURL: ${{ steps.deploy.outputs.instance-url }} \n*<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>* \n :large_green_circle: :large_green_circle: :large_green_circle: :large_green_circle:"
        if: success()
        continue-on-error: true

      - name: Comment PR on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: `## ❌ Deployment to VCR Failed\n\n**Commit:** \`${{ steps.pr.outputs.head_sha }}\`\n\n[View build logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
        continue-on-error: true

      - name: Slack notification on failure
        uses: ./.github/actions/slack-notify
        with:
          slack-bot-token: ${{ secrets.SLACK_NOTIFICATION }}
          color: FF0000
          message: "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ steps.pr.outputs.number }}|${{ steps.pr.outputs.title }}>* \n with commit hash: ${{ steps.pr.outputs.head_sha }} \n FAILED to deploy to VCR \n *<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>* \n :red_circle: :red_circle: :red_circle: :red_circle:"
        if: failure()
        continue-on-error: true
