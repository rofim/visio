name: Remove PR VCR instance on comment

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to remove
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  remove-vcr:
    name: Remove VCR instance (comment trigger)
    # Run only when:
    # - comment is on a PR
    # - comment body is exactly 'vcr:remove'
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.body == 'vcr:remove') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-22.04
    steps:
      - name: Load PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue?.number ?? Number(context.payload.inputs?.pr_number);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('title', pr.title || '');
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput(
              'is_fork',
              String(pr.head.repo.full_name !== pr.base.repo.full_name)
            );

      - name: Block forks
        if: steps.pr.outputs.is_fork == 'true'
        run: |
          echo "Removal from forked repositories is not allowed."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install VCR CLI
        uses: ./.github/actions/install-vcr-cli

      - name: Remove VCR instance (tolerant)
        id: remove
        shell: bash
        env:
          VCR_API_KEY: ${{ secrets.VCR_API_KEY }}
          VCR_API_SECRET: ${{ secrets.VCR_API_SECRET }}
        run: |
          set -euo pipefail

          PROJECT_NAME="vonage-video-react-app"
          INSTANCE_NAME="vera-pr-${{ steps.pr.outputs.number }}"

          echo "instance_name=$INSTANCE_NAME" >> "$GITHUB_OUTPUT"
          echo "Removing instance: $INSTANCE_NAME"

          set +e
          vcr instance remove \
            --project-name "$PROJECT_NAME" \
            --instance-name "$INSTANCE_NAME" \
            --api-key "$VCR_API_KEY" \
            --api-secret "$VCR_API_SECRET" \
            --region aws.euw1 \
            --graphql-endpoint https://graphql.euw1.runtime.vonage.cloud/v1/graphql \
            2>&1 | tee remove-vcr-logs.log
          RC=${PIPESTATUS[0]}
          set -e

          if [ "$RC" -eq 0 ]; then
            echo "result=removed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Treat "not found" as non-fatal
          if grep -Eqi 'not found|does not exist|no such|404' remove-vcr-logs.log; then
            echo "result=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "result=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Slack notification on removed
        uses: ./.github/actions/slack-notify
        with:
          slack-bot-token: ${{ secrets.SLACK_NOTIFICATION }}
          color: '28a745'
          message: "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ steps.pr.outputs.number }}|#${{ steps.pr.outputs.number }} - ${{ steps.pr.outputs.title }}>* \n with commit hash: ${{ steps.pr.outputs.head_sha }} \n had instance removed from VCR \nInstance: `${{ steps.remove.outputs.instance_name }}` \n*<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>* \n :large_green_circle: :large_green_circle: :large_green_circle: :large_green_circle:"
        if: steps.remove.outputs.result == 'removed'
        continue-on-error: true

      - name: Slack notification on no instance found
        uses: ./.github/actions/slack-notify
        with:
          slack-bot-token: ${{ secrets.SLACK_NOTIFICATION }}
          color: FFA500
          message: "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ steps.pr.outputs.number }}|#${{ steps.pr.outputs.number }} - ${{ steps.pr.outputs.title }}>* \n with commit hash: ${{ steps.pr.outputs.head_sha }} \n had no VCR instance to remove \nInstance: `${{ steps.remove.outputs.instance_name }}` \n*<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>*"
        if: steps.remove.outputs.result == 'missing'
        continue-on-error: true

      - name: Slack notification on failure
        uses: ./.github/actions/slack-notify
        with:
          slack-bot-token: ${{ secrets.SLACK_NOTIFICATION }}
          color: FF0000
          message: "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ steps.pr.outputs.number }}|#${{ steps.pr.outputs.number }} - ${{ steps.pr.outputs.title }}>* \n with commit hash: ${{ steps.pr.outputs.head_sha }} \n FAILED to remove instance from VCR \nInstance: `${{ steps.remove.outputs.instance_name }}` \n *<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>* \n :red_circle: :red_circle: :red_circle: :red_circle:"
        if: failure()
        continue-on-error: true
