name: Remove PR VCR instance on comment

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to remove
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  remove-vcr:
    name: Remove VCR instance (comment trigger)
    # Run only when:
    # - comment is on a PR
    # - comment body is exactly 'vcr:remove'
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.body == 'vcr:remove') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: [vcp-runner]
    steps:
      - name: Load PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue?.number ?? Number(context.payload.inputs?.pr_number);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('title', pr.title || '');
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput(
              'is_fork',
              String(pr.head.repo.full_name !== pr.base.repo.full_name)
            );

      - name: Block forks
        if: steps.pr.outputs.is_fork == 'true'
        run: |
          echo "Removal from forked repositories is not allowed."
          exit 1

      - name: Install VCR CLI
        shell: bash
        run: |
          set -euo pipefail
          curl --proto =https --max-redirs 0 -fsSL https://raw.githubusercontent.com/Vonage/cloud-runtime-cli/main/script/install.sh -o install.sh
          sudo bash install.sh
          vcr -v

      - name: Remove VCR instance (tolerant)
        id: remove
        shell: bash
        env:
          VCR_API_KEY: ${{ secrets.VCR_API_KEY }}
          VCR_API_SECRET: ${{ secrets.VCR_API_SECRET }}
        run: |
          set -euo pipefail

          PROJECT_NAME="vonage-video-react-app"
          INSTANCE_NAME="vera-pr-${{ steps.pr.outputs.number }}"

          echo "instance_name=$INSTANCE_NAME" >> "$GITHUB_OUTPUT"
          echo "Removing instance: $INSTANCE_NAME"

          set +e
          vcr instance remove \
            --project-name "$PROJECT_NAME" \
            --instance-name "$INSTANCE_NAME" \
            --api-key "$VCR_API_KEY" \
            --api-secret "$VCR_API_SECRET" \
            --region aws.euw1 \
            --graphql-endpoint https://graphql.euw1.runtime.vonage.cloud/v1/graphql \
            2>&1 | tee remove-vcr-logs.log
          RC=${PIPESTATUS[0]}
          set -e

          if [ "$RC" -eq 0 ]; then
            echo "result=removed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Treat "not found" as non-fatal
          if grep -Eqi 'not found|does not exist|no such|404' remove-vcr-logs.log; then
            echo "result=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "result=failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Slack notification on removed
        uses: slackapi/slack-github-action@70cd7be8e40a46e8b0eced40b0de447bdb42f68e # v1.26.0
        with:
          channel-id: '#video-solutions-ci-notifications'
          payload: |
            {
              "text": "Vera Deployment GHA Job",
              "attachments": [
                {
                  "color": "28a745",
                  "text": "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ steps.pr.outputs.number }}|#${{ steps.pr.outputs.number }} - ${{ steps.pr.outputs.title }}>* \n with commit hash: ${{ steps.pr.outputs.head_sha }} \n had instance removed from VCR \nInstance: `${{ steps.remove.outputs.instance_name }}` \n*<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>* \n :large_green_circle: :large_green_circle: :large_green_circle: :large_green_circle:"
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_NOTIFICATION }}
        if: steps.remove.outputs.result == 'removed'
        continue-on-error: true

      - name: Slack notification on no instance found
        uses: slackapi/slack-github-action@70cd7be8e40a46e8b0eced40b0de447bdb42f68e # v1.26.0
        with:
          channel-id: '#video-solutions-ci-notifications'
          payload: |
            {
              "text": "Vera Deployment GHA Job",
              "attachments": [
                {
                  "color": "FFA500",
                  "text": "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ steps.pr.outputs.number }}|#${{ steps.pr.outputs.number }} - ${{ steps.pr.outputs.title }}>* \n with commit hash: ${{ steps.pr.outputs.head_sha }} \n had no VCR instance to remove \nInstance: `${{ steps.remove.outputs.instance_name }}` \n*<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>*"
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_NOTIFICATION }}
        if: steps.remove.outputs.result == 'missing'
        continue-on-error: true

      - name: Slack notification on failure
        uses: slackapi/slack-github-action@70cd7be8e40a46e8b0eced40b0de447bdb42f68e # v1.26.0
        with:
          channel-id: '#video-solutions-ci-notifications'
          payload: |
            {
              "text": "Vera Deployment GHA Job",
              "attachments": [
                {
                  "color": "FF0000",
                  "text": "Vera pull request *<https://github.com/Vonage/vonage-video-react-app/pull/${{ steps.pr.outputs.number }}|#${{ steps.pr.outputs.number }} - ${{ steps.pr.outputs.title }}>* \n with commit hash: ${{ steps.pr.outputs.head_sha }} \n FAILED to remove instance from VCR \nInstance: `${{ steps.remove.outputs.instance_name }}` \n *<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to go to build logs>* \n :red_circle: :red_circle: :red_circle: :red_circle:"
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_NOTIFICATION }}
        if: failure()
        continue-on-error: true
