name: update-screenshots

on:
  pull_request:
    types: [opened, reopened, labeled, synchronize]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VIDEO_SERVICE_PROVIDER: ${{vars.VIDEO_SERVICE_PROVIDER}}
  OT_API_KEY: ${{secrets.API_KEY}}
  OT_API_SECRET: ${{secrets.API_SECRET}}
  VONAGE_APP_ID: ${{secrets.VONAGE_APP_ID}}
  VONAGE_PRIVATE_KEY: ${{secrets.VONAGE_PRIVATE_KEY}}
  BRANCH_NAME: ${{ github.head_ref }}
  REPO_NAME: ${{ github.repository }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  run:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      # -----------------------
      # 0. Check PR label
      # -----------------------
      - name: Check for "update-screenshots" label
        id: check-update-screenshots
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(label => label.name);
            return labels.includes("update-screenshots");

      - name: Update Screenshots
        if: steps.check-update-screenshots.outputs.result == 'false'
        run: |
          echo "Update shreenshots is false"

      # -----------------------
      # 1. Install Chrome Latest
      # -----------------------
      - name: Install chrome latest
        if: steps.check-update-screenshots.outputs.result == 'true'
        run: |
          wget --max-redirect=0 -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] https://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt update && sudo apt install -y google-chrome-stable 
          echo "Check chrome version"
          /usr/bin/google-chrome-stable --version
          echo "Chrome latest downloaded and installed"

      # -----------------------
      # 2. Install Edge Latest
      # -----------------------
      - name: Install edge latest
        if: steps.check-update-screenshots.outputs.result == 'true'
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo install -o root -g root -m 644 microsoft.gpg /etc/apt/trusted.gpg.d/
          sudo sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/repos/edge stable main" > /etc/apt/sources.list.d/microsoft-edge-dev.list'
          sudo rm microsoft.gpg
          sudo apt update && sudo apt install -y microsoft-edge-stable
          echo "Check edge version"
          /usr/bin/microsoft-edge-stable --version
          echo "Edge latest downloaded and installed"

      # -----------------------
      # 3. Checkout repository
      # -----------------------
      - name: Checkout
        if: steps.check-update-screenshots.outputs.result == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      # -----------------------
      # 4. Setup Node
      # -----------------------
      - name: Setup node
        if: steps.check-update-screenshots.outputs.result == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # -----------------------
      # 5. Install dependencies
      # -----------------------
      - name: Install Dependencies
        if: steps.check-update-screenshots.outputs.result == 'true'
        run: |
          node -v
          npm -v
          npm install --global --ignore-scripts yarn
          yarn --ignore-scripts

      # -----------------------
      # 6. Install Playwright browsers (Firefox, WebKit, Chromium)
      # -----------------------
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # -----------------------
      # 7. Run Integration Tests (update screenshots)
      # -----------------------
      - name: Run integration tests
        if: steps.check-update-screenshots.outputs.result == 'true'
        run: |
          Xvfb :99 & export DISPLAY=:99
          yarn test:integrationUpdateScreenshots

      # -----------------------
      # 8. Auto-commit updated screenshots
      # -----------------------
      - name: Auto-commit updated screenshots
        if: always() && steps.check-update-screenshots.outputs.result == 'true'
        run: |
          echo "Committing screenshots to $BRANCH_NAME"

          # Configure git user for the commit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Get changed snapshot PNGs under integration-tests/...-snapshots/
          FILES_CHANGED=$(git status --porcelain | awk '$2 ~ /^integration-tests\/tests\/visualComparisons\.spec\.ts-snapshots\/.*\.png$/ {print $2}')

          if [ -z "$FILES_CHANGED" ]; then
            echo "No snapshot files changed, nothing to commit."
            exit 0
          fi

          echo "Files to commit:"
          echo "$FILES_CHANGED"

          git add $FILES_CHANGED
          git commit -m "Update visual comparison screenshots"
          git push origin HEAD:$BRANCH_NAME
